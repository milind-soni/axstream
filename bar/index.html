<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: transparent; overflow: hidden; }
  #bar {
    height: 64px; margin: 6px;
    display: flex; align-items: center; gap: 12px;
    padding: 0 18px;
    background: rgba(18, 18, 20, 0.92);
    border: 1px solid rgba(255, 255, 255, 0.09);
    border-radius: 16px;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    color: #eee;
    -webkit-app-region: drag;
  }
  #dot {
    width: 12px; height: 12px; border-radius: 50%;
    background: #555; flex-shrink: 0; transition: background 0.15s;
  }
  #dot.listening { background: #ff453a; box-shadow: 0 0 10px #ff453a; }
  #dot.thinking { background: #ffd60a; box-shadow: 0 0 10px #ffd60a; }
  #dot.acting { background: #30d158; box-shadow: 0 0 10px #30d158; }
  #main { flex: 1; min-width: 0; }
  #text {
    font-size: 14px; line-height: 1.3;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    color: #ddd;
  }
  #text.partial { color: #9a9a9e; font-style: italic; }
  #chips {
    display: flex; gap: 5px; margin-top: 3px;
    overflow: hidden; height: 18px;
  }
  .chip {
    font-size: 10.5px; padding: 1px 8px; border-radius: 8px;
    background: rgba(48, 209, 88, 0.16); color: #6fe08e;
    border: 1px solid rgba(48, 209, 88, 0.35);
    white-space: nowrap; flex-shrink: 0;
    animation: pop 0.14s ease-out;
  }
  .chip.err { background: rgba(255,69,58,0.16); color: #ff8a80; border-color: rgba(255,69,58,0.4); }
  @keyframes pop { from { transform: scale(0.6); opacity: 0; } }
  #hint { font-size: 10.5px; color: #7a7a7e; flex-shrink: 0; text-align: right; }
</style>
</head>
<body>
<div id="bar">
  <div id="dot"></div>
  <div id="main">
    <div id="text">hold ⌃ ⌥ and speak</div>
    <div id="chips"></div>
  </div>
  <div id="hint">axstream</div>
</div>
<script>
  const dot = document.getElementById("dot");
  const text = document.getElementById("text");
  const chips = document.getElementById("chips");
  const hint = document.getElementById("hint");

  let ws = null;
  function connect() {
    ws = new WebSocket("ws://localhost:8790");
    ws.onopen = () => { hint.textContent = "axstream"; };
    ws.onclose = () => { hint.textContent = "bridge offline"; setTimeout(connect, 1500); };
    ws.onmessage = (m) => handle(JSON.parse(m.data));
  }
  connect();

  const opLabel = (e) => {
    const op = e.op || {};
    const do_ = op.do || op.op;
    if (do_ === "type") return `type "${(op.text || "").slice(0, 24)}"`;
    if (do_ === "key") return `⌨ ${(op.keys || []).join("+")}`;
    if (op.resolved) return `${do_} ${op.resolved.split(" ").slice(1).join(" ")}`;
    return do_;
  };

  function setState(s) { dot.className = s; }
  function addChip(label, err = false) {
    const c = document.createElement("div");
    c.className = "chip" + (err ? " err" : "");
    c.textContent = label;
    chips.appendChild(c);
    while (chips.scrollWidth > chips.clientWidth && chips.children.length > 1)
      chips.removeChild(chips.firstChild);
  }

  function handle(msg) {
    switch (msg.type) {
      case "listening":
        setState("listening"); chips.innerHTML = "";
        text.className = "partial"; text.textContent = "listening...";
        break;
      case "partial":
        text.className = "partial"; text.textContent = msg.text;
        break;
      case "transcript":
        text.className = ""; text.textContent = msg.text || "(heard nothing)";
        if (msg.text) setState("thinking");
        hint.textContent = `stt ${Math.round(msg.stt_ms)}ms`;
        break;
      case "event":
        if (msg.kind === "executed") { setState("acting"); addChip(opLabel(msg)); }
        if (msg.kind === "action_failed") addChip(`✕ ${opLabel(msg)}`, true);
        if (msg.kind === "burst_start") setState("thinking");
        if (msg.kind === "done") addChip("done");
        break;
      case "task_done":
        setState(""); hint.textContent = `${msg.seconds.toFixed(1)}s`;
        break;
      case "error":
        setState(""); addChip(msg.message.slice(0, 40), true);
        break;
    }
  }

  window.ptt.onDown(() => { if (ws?.readyState === 1) ws.send(JSON.stringify({ type: "start_listen" })); });
  window.ptt.onUp(() => { if (ws?.readyState === 1) ws.send(JSON.stringify({ type: "stop_listen" })); });
</script>
</body>
</html>
